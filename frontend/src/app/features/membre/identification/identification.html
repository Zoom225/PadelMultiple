<div class="flex items-center justify-center min-h-screen bg-gradient-to-br from-gray-100 to-blue-100">
  <div class="w-full max-w-md bg-white shadow-2xl rounded-2xl p-8">
    <div class="flex flex-col items-center mb-6">
      <h1 class="text-3xl font-extrabold text-blue-700 mb-1">Padel Club</h1>
      <p class="text-gray-500 text-center">Entrez votre matricule pour accéder</p>
    </div>
    <div class="flex flex-col gap-4">
      @if (error) {
        <div class="bg-red-100 text-red-700 p-3 rounded text-sm text-center">
          {{ error }}
        </div>
      }
      <div class="mb-2">
        <label class="block text-gray-700 font-medium mb-1" for="matricule">Matricule</label>
        <input
          id="matricule"
          type="text"
          [(ngModel)]="matricule"
          placeholder="Ex: G1234, S12345, L12345"
          (keyup.enter)="identify()"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
        />
        <div class="text-xs text-gray-400 mt-1">GLOBAL: G+4 · SITE: S+5 · LIBRE: L+5</div>
      </div>
      <button
        class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition flex items-center justify-center"
        (click)="identify()"
        [disabled]="loading"
      >
        @if (loading) {
          <svg class="animate-spin h-5 w-5 mr-2 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg>
        }
        Accéder
      </button>
    </div>
    <div class="text-center mt-6">
      <a routerLink="/admin/login" class="text-sm text-gray-400 hover:text-blue-600 font-medium transition">Accès administrateur</a>
    </div>
  </div>
</div>
