<div class="flex items-center justify-center h-screen bg-gray-100">
  <mat-card class="w-full max-w-sm shadow-lg p-4">

    <mat-card-header class="flex flex-col items-center mb-4">
      <mat-card-title class="text-2xl font-bold">
        Administration
      </mat-card-title>
      <mat-card-subtitle class="text-center mt-1">
        Accès réservé aux administrateurs
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="flex flex-col gap-4">

      @if (error) {
        <div class="bg-red-100 text-red-700 p-3 rounded text-sm">
          {{ error }}
        </div>
      }

      <mat-form-field class="w-full" appearance="fill" floatLabel="always">
        <mat-label>Email</mat-label>
        <input
          matInput
          type="email"
          [(ngModel)]="email"
          placeholder="admin@padel.com"
          (keyup.enter)="login()"
        />
      </mat-form-field>

      <mat-form-field class="w-full mb-4" appearance="fill" floatLabel="always">
        <mat-label>Mot de passe</mat-label>
        <input
          matInput
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          placeholder="••••••••"
          (keyup.enter)="login()"
        />
        <button
          matSuffix
          mat-icon-button
          (click)="showPassword = !showPassword"
          type="button"
        >
          <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

      <button
        mat-flat-button
        color="primary"
        class="w-full py-2"
        (click)="login()"
        [disabled]="loading"
      >
        @if (loading) {
          <mat-spinner diameter="20" class="inline-block mr-2"/>
        }
        Se connecter
      </button>

    </mat-card-content>

    <mat-card-footer class="text-center p-4">
      <a routerLink="/membre/login" class="text-sm text-gray-400 hover:text-gray-600 cursor-pointer">
        Retour accès membre
      </a>
    </mat-card-footer>

  </mat-card>
</div>
