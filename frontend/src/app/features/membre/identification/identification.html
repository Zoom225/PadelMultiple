<div class="flex items-center justify-center h-screen bg-gray-100">
  <mat-card class="w-full max-w-sm shadow-lg rounded-xl p-4">

    <mat-card-header class="flex flex-col items-center mb-4">
      <mat-card-title class="text-2xl font-bold">
        Padel Club
      </mat-card-title>
      <mat-card-subtitle class="text-center mt-1">
        Entrez votre matricule pour accéder
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="flex flex-col gap-4">

      @if (error) {
        <div class="bg-red-100 text-red-700 p-3 rounded text-sm">
          {{ error }}
        </div>
      }

      <mat-form-field class="w-full mb-6" appearance="fill" floatLabel="always">
        <mat-label>Matricule</mat-label>
        <input
          matInput
          [(ngModel)]="matricule"
          placeholder="Ex: G1234, S12345, L12345"
          (keyup.enter)="identify()"
        />
        <mat-hint>GLOBAL: G+4 · SITE: S+5 · LIBRE: L+5</mat-hint>
      </mat-form-field>

      <button
        mat-flat-button
        color="primary"
        class="w-full py-2"
        (click)="identify()"
        [disabled]="loading"
      >
        @if (loading) {
          <mat-spinner diameter="20" class="inline-block mr-2"/>
        }
        Accéder
      </button>

    </mat-card-content>

    <mat-card-footer class="text-center p-4">
      <a routerLink="/admin/login" class="text-sm text-gray-400 hover:text-gray-600 cursor-pointer">
        Accès administrateur
      </a>
    </mat-card-footer>

  </mat-card>
</div>
