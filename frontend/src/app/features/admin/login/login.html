<div class="flex items-center justify-center min-h-screen bg-gradient-to-br from-gray-100 to-blue-100">
  <div class="w-full max-w-md bg-white shadow-2xl rounded-2xl p-8">
    <div class="flex flex-col items-center mb-6">
      <h1 class="text-3xl font-extrabold text-blue-700 mb-1">Administration</h1>
      <p class="text-gray-500 text-center">Accès réservé aux administrateurs</p>
    </div>
    <div class="flex flex-col gap-4">
      @if (error) {
        <div class="bg-red-100 text-red-700 p-3 rounded text-sm text-center">
          {{ error }}
        </div>
      }
      <div class="mb-2">
        <label class="block text-gray-700 font-medium mb-1" for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          placeholder="admin@padel.com"
          (keyup.enter)="login()"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
        />
      </div>
      <div class="mb-4">
        <label class="block text-gray-700 font-medium mb-1" for="password">Mot de passe</label>
        <div class="relative">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            placeholder="••••••••"
            (keyup.enter)="login()"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition pr-10"
          />
          <button type="button" (click)="showPassword = !showPassword" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600">
            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.956 9.956 0 012.293-3.95m3.32-2.69A9.953 9.953 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.956 9.956 0 01-4.043 5.197M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
          </button>
        </div>
      </div>
      <button
        class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition flex items-center justify-center"
        (click)="login()"
        [disabled]="loading"
      >
        @if (loading) {
          <svg class="animate-spin h-5 w-5 mr-2 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg>
        }
        Se connecter
      </button>
    </div>
    <div class="text-center mt-6">
      <a routerLink="/membre/login" class="text-sm text-gray-400 hover:text-blue-600 font-medium transition">Retour accès membre</a>
    </div>
  </div>
</div>
